<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Forking branch — difference/diverge -->
  <g opacity="0.95">
    <!-- Main stem -->
    <path d="M32 48 C32 42, 32 38, 32 32" stroke="#7a8fa6" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Left fork -->
    <path d="M32 32 C28 28, 22 24, 18 20" stroke="#7a8fa6" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Right fork -->
    <path d="M32 32 C36 28, 42 24, 46 20" stroke="#92b0c2" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Left leaf bud -->
    <path d="M18 20 C16 16, 18 14, 22 14 C22 18, 20 20, 18 20" fill="#a8c8d8" stroke="#7a8fa6" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Right leaf bud -->
    <path d="M46 20 C48 16, 46 14, 42 14 C42 18, 44 20, 46 20" fill="#c0d8e8" stroke="#7a8fa6" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Fork point glow -->
    <circle cx="32" cy="32" r="3" fill="#e5f1f8" opacity="0.6"/>
    <!-- Ground -->
    <ellipse cx="32" cy="49" rx="6" ry="2" fill="#c4b08a" opacity="0.4"/>
  </g>
</svg>
